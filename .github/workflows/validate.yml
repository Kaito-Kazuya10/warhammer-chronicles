name: Validate

on:
  pull_request:
    branches:
      - master
      - staging
  push:
    branches:
      - staging

jobs:
  validate:
    name: Type Check + Lint + Game Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate
